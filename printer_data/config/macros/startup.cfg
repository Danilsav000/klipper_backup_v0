[delayed_gcode STARTUP]
initial_duration: 1
gcode:
  _STARTUP


[gcode_macro _STARTUP]
gcode:
   {% set verbose = printer["gcode_macro _USER_VARIABLES"].verbose %}

    {% if verbose %}
        RESPOND MSG="Система готова к работе"
    {% endif %}
   
   _STARTUP_LEDS






[gcode_macro _STARTUP_LEDS]
gcode:
  {% set status_leds = printer["gcode_macro _USER_VARIABLES"].status_leds %}
  {% set caselight_enabled = printer["gcode_macro _USER_VARIABLES"].caselight_enabled %}
  {% set display_enabled = printer["gcode_macro _USER_VARIABLES"].display_enabled %}

  {% if status_leds %}
        status_startup
  {% endif %}

  {% if caselight_enabled %}
        _START_LED_CASELIGHT
  {% endif %}

  {% if display_enabled %}
        _DISPLAY_STARTUP
  {% endif %}
