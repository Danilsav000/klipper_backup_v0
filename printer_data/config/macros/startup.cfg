
[gcode_macro _STARTUP]
gcode:
   {% set verbose = printer["gcode_macro _USER_VARIABLES"].verbose %}

    {% if verbose %}
        RESPOND MSG="Система готова к работе"
    {% endif %}
   
   _STARTUP_LEDS


status_startup

[gcode_macro _STARTUP_LEDS]
gcode:
  {% set neopixel_enabled = printer["gcode_macro _USER_VARIABLES"].neopixel_enabled %}
  {% set caselight_enabled = printer["gcode_macro _USER_VARIABLES"].caselight_enabled %}

  {% if neopixel_enabled %}
        status_startup
  {% endif %}

  {% if caselight_enabled %}
        _START_LED_CASELIGHT
  {% endif %}
