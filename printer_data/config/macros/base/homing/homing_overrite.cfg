[gcode_macro _HOME_X]
gcode:
    {% set verbose = printer["gcode_macro _USER_VARIABLES"].verbose %}
    # Home
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2240 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2240 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.7 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}
    
    SET_KINEMATIC_POSITION X=15

    {% if verbose %}
        RESPOND MSG="Парковка оси Х"
    {% endif %}
    
    G91
    G1 X5 F1200
    
    #G4 P2000
    #M400 to finish all pending moves/process the buffer
    M400 
    G28 X
    
    # Move away
    G91
    G1 X10 F1200
    G4 P1000
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Y]
gcode:
    {% set verbose = printer["gcode_macro _USER_VARIABLES"].verbose %}
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2240 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2240 stepper_y'].run_current|float %}
    {% set HOME_CURRENT = 0.7 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}
    
    SET_KINEMATIC_POSITION Y=15

    {% if verbose %}
        RESPOND MSG="Парковка оси У"
    {% endif %}
    
    
    G91
    G1 Y5 F1200
    
    #G4 P2000
    #M400 to finish all pending moves/process the buffer
    M400 
    
    # Home
    G28 Y
    # Move away
    G91
    G1 Y-10 F1200
    G4 P1000

    # Wait just a second… (give StallGuard registers time to clear)
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}


[homing_override]
axes: xyz
gcode:
  {% set status_leds = printer["gcode_macro _USER_VARIABLES"].status_leds %}
  {% set verbose = printer["gcode_macro _USER_VARIABLES"].verbose %}
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  {% if status_leds %}
        status_homing
  {% endif %}

  SET_KINEMATIC_POSITION Z=10

  {% if verbose %}
        RESPOND MSG="Парковка оси Х"
  {% endif %}
    
  G1 Z5 F1200

  {% if home_all or 'X' in params %}
    _HOME_X
  {% endif %}
  
  {% if home_all or 'Y' in params %}
    _HOME_Y
  {% endif %}
  
  {% if home_all or 'Z' in params %}
    G90
    G1 X60 Y60 F5000
    
    G28 Z
    G90
    G1 Z60 F1500
    M400

  {% if status_leds %}
        status_startup
  {% endif %}
  {% endif %}