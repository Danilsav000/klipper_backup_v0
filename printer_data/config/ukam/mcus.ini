[rpi]
klipper_section: mcu rpi
action_command: make flash

[mcu]
klipper_section: mcu
action_command: python3 ~/katapult/scripts/flashtool.py -i can0 -u 8024ec808dc1 -r; sleep 2
action_command: python3 ~/katapult/scripts/flashtool.py -f ~/klipper/out/klipper.bin -d /dev/serial/by-id/usb-katapult_stm32h723xx_130025001351313531383332-if00


[toolhead]
klipper_section: mcu toolhead
action_command: python3 ~/katapult/scripts/flashtool.py -i can0 -u a9b1ebc3351b -r; sleep 2
action_command: python3 ~/katapult/scripts/flashtool.py -i can0 -u a9b1ebc3351b -f ~/klipper/out/klipper.bin

[display]
klipper_section: mcu
action_command: make flash FLASH_DEVICE=/dev/serial/by-id/usb-Klipper_stm32f042x6_19000E000743304754393320-if00

