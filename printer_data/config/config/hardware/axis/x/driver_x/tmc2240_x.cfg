run_current: 1.06
rref: 12000
stealthchop_threshold: 0
diag0_pin: ^!mcu:X_STOP

driver_SLOPE_CONTROL: 2
driver_SG4_THRS: 120
driver_TBL: 0
driver_TOFF: 1
driver_HSTRT: 0
driver_HEND: 6
driver_TPFD: 1
