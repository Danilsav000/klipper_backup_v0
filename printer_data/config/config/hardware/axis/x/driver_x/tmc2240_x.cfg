spi_speed: 500000
spi_software_sclk_pin: mcu:DRIVER_SPI_SCK
spi_software_mosi_pin: mcu:DRIVER_SPI_MOSI
spi_software_miso_pin: mcu:DRIVER_SPI_MISO
