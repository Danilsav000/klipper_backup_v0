

[include driver/tmc2209/tmc2209.cfg]


[extruder]
step_pin: toolhead:E_STEP
dir_pin: !toolhead:E_DIR
enable_pin: !toolhead:E_ENABLE


microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 4.69
max_extrude_only_distance: 500
max_extrude_only_velocity: 120

nozzle_diameter: 0.4
filament_diameter: 1.75
pressure_advance: 0.02
pressure_advance_smooth_time: 0.4

heater_pin: toolhead:E_HEATER
max_power: 0.95
#max_power: 0.995
pwm_cycle_time: 0.1
#pwm_cycle_time: 0.1
smooth_time: 1.0
#smooth_time: 0.4
control: pid
pid_Kp: 1
pid_Ki: 1
pid_Kd: 1


min_extrude_temp: 200
min_temp: 10
max_temp: 340


## For PT100/PT1000
sensor_type: MAX31865
sensor_pin: toolhead:MAX31865_CS
spi_bus: spi1
#spi_speed: 1000000
#spi_software_sclk_pin: toolhead:MAX31865_CLK
#spi_software_mosi_pin: toolhead:MAX31865_MOSI
#spi_software_miso_pin: toolhead:MCU_SPI1_MISO
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2
rtd_use_50Hz_filter: True

#sensor_type: PT1000
#sensor_pin: mcu:E_TEMPERATURE


