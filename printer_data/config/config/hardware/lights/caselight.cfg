

#[include config_colors.cfg]


[neopixel caselight]
pin: mcu:STATUS_NEOPIXEL
#   The pin connected to the neopixel. This parameter must be
#   provided.
chain_count: 20
#   The number of Neopixel chips that are "daisy chained" to the
#   provided pin. The default is 1 (which indicates only a single
#   Neopixel is connected to the pin).
color_order: GRB
#   Set the pixel order required by the LED hardware (using a string
#   containing the letters R, G, B, W with W optional). The default is
#   GRB.
initial_RED: 0.0
initial_GREEN: 0.4
initial_BLUE: 0.5


[gcode_macro _START_PRINT_LED_CASELIGHT]
gcode:
  SET_LED LED="caselight" RED=0.88 GREEN=0.51 BLUE=0.27 SYNC=0 TRANSMIT=1

[gcode_macro _START_LED_CASELIGHT]
gcode:
  SET_LED LED="caselight" RED=0.22 GREEN=0.43 BLUE=0.48 SYNC=0 TRANSMIT=1

[gcode_macro CASELIGHT_OFF]
gcode:
  SET_LED LED="caselight" RED=0 GREEN=0 BLUE=0 SYNC=0 TRANSMIT=1



